<!DOCTYPE html>

<html>
<head>

<title>Exacell Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2ecc71,#27ae60);
}

.register-box{
width:360px;
padding:35px;
background:white;
border-radius:12px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.register-box h2{
margin-bottom:20px;
color:#333;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#27ae60;
outline:none;
box-shadow:0px 0px 5px rgba(39,174,96,0.5);
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#219150;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#27ae60;
font-size:14px;
}

a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<a href="/login/">Already have an account? Login</a>

</div>

</body>
</html>
