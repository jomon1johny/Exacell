<!DOCTYPE html>

<html>
<head>

<title>Exacell Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2ecc71,#27ae60);
}

.login-box{
width:360px;
padding:35px;
background:white;
border-radius:12px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
color:#2c3e50;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#27ae60;
outline:none;
box-shadow:0px 0px 5px rgba(39,174,96,0.5);
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1e8449;
}

a{
display:block;
margin-top:15px;
text-decoration:none;
color:#27ae60;
font-size:14px;
}

a:hover{
text-decoration:underline;
}

.popup-message{
    position:fixed;
    top:20px;
    right:20px;
    background:#e74c3c;
    color:white;
    padding:15px 25px;
    border-radius:10px;
    z-index:999;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Exacell Login</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a href="/register/">Create an account</a>

</div>

{% if messages %}
<div class="popup-message">
    {% for message in messages %}
        {{ message }}
    {% endfor %}
</div>
{% endif %}

</body>
</html>
