<!DOCTYPE html>
<html>
<head>

<title>Update Data | Exacell</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef7f1;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

h2{
color:#27ae60;
}

.back-btn{
background:#3498db;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

label{
font-weight:bold;
margin-bottom:5px;
}

input{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

input:focus{
outline:none;
border-color:#27ae60;
}

.submit-btn{
margin-top:30px;
width:100%;
padding:14px;
background:#27ae60;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.submit-btn:hover{
background:#1e8449;
}

@media(max-width:768px){
.form-grid{
grid-template-columns:1fr;
}
}

</style>

</head>
<body>

<div class="container">

<div class="top-bar">

<h2>Update Spreadsheet Row</h2>

<a href="{% url 'view_data' %}" class="back-btn">← Back</a>

</div>

<form method="POST">

{% csrf_token %}

<div class="form-grid">

<div class="input-group">
<label>GEM</label>
<input type="text" name="gem" value="{{data.gem}}">
</div>

<div class="input-group">
<label>Date</label>
<input type="date" name="date" value="{{data.date|date:'Y-m-d'}}">
</div>

<div class="input-group">
<label>Place</label>
<input type="text" name="place" value="{{data.place}}">
</div>

<div class="input-group">
<label>Officer</label>
<input type="text" name="officer" value="{{data.officer}}">
</div>

<div class="input-group">
<label>Contact</label>
<input type="text" name="contact" value="{{data.contact}}">
</div>

<div class="input-group">
<label>Marketing</label>
<input type="text" name="marketing" value="{{data.marketing}}">
</div>

<div class="input-group">
<label>Item</label>
<input type="text" name="item" value="{{data.item}}">
</div>

<div class="input-group">
<label>Rate</label>
<input type="number" step="any" name="rate" value="{{data.rate}}">
</div>

<div class="input-group">
<label>GST</label>
<input type="number" step="any" name="gst" value="{{data.gst}}">
</div>

<div class="input-group">
<label>Company</label>
<input type="text" name="company" value="{{data.company}}">
</div>

<div class="input-group">
<label>Bill</label>
<input type="text" name="bill" value="{{data.bill}}">
</div>

<div class="input-group">
<label>Bill Date</label>
<input type="date" name="billdate" value="{{data.billdate|date:'Y-m-d'}}">
</div>

<div class="input-group">
<label>Qty</label>
<input type="number" step="any" name="qty" value="{{data.qty}}">
</div>

<div class="input-group">
<label>Price</label>
<input type="number" step="any" name="price" value="{{data.price}}">
</div>

<div class="input-group">
<label>Amount</label>
<input type="number" step="any" name="amount" value="{{data.amount}}">
</div>

<div class="input-group">
<label>FR</label>
<input type="number" step="any" name="fr" value="{{data.fr}}">
</div>

<div class="input-group">
<label>FB</label>
<input type="number" step="any" name="fb" value="{{data.fb}}">
</div>

<div class="input-group">
<label>TFR</label>
<input type="number" step="any" name="tfr" value="{{data.tfr}}">
</div>

<div class="input-group">
<label>Order</label>
<input type="text" name="orderby" value="{{data.orderby}}">
</div>

</div>

<button type="submit" class="submit-btn">
✔ Update Data
</button>

</form>

</div>

</body>
</html>
